global:
  resolve_timeout: 5m

route:
  receiver: "ntfy-alerts"
  group_by: ["alertname", "severity"]
  group_wait: 15s
  group_interval: 5m
  repeat_interval: 30m

  routes:
    - matchers:
        - severity = "critical"
      receiver: "ntfy-critical"
      group_wait: 5s
      repeat_interval: 15m
    - matchers:
        - severity = "warning"
      receiver: "ntfy-alerts"

receivers:
  - name: "ntfy-alerts"
    webhook_configs:
      - url: "https://ntfy.sh/samuel-notes-app-warnings?title=Notes+App+Warning&priority=default&tags=warning"
        send_resolved: true
        max_alerts: 5

  - name: "ntfy-critical"
    webhook_configs:
      - url: "https://ntfy.sh/samuel-notes-app-critical?title=CRITICAL+Notes+App+Alert&priority=urgent&tags=rotating_light"
        send_resolved: true
        max_alerts: 5

inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ["alertname"]