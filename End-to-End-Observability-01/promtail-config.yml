server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: "notes-app"
    static_configs:
      - targets:
          - localhost
        labels:
          job: "notes-app"
          app: "notes"
          __path__: "/var/log/app/*.log"
    pipeline_stages:
      # Extract log level from the log line
      - regex:
          expression: '.*(?P<level>INFO|WARNING|ERROR|DEBUG|CRITICAL).*'
      - labels:
          level:
      # Extract trace_id if present
      - regex:
          expression: '.*trace_id=(?P<trace_id>[a-f0-9]+).*'
      - labels:
          trace_id: